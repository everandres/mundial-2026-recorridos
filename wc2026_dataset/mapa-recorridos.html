<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mundial 2026 · Mapa de recorridos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#090D18; --panel:#0F1526; --panel2:#141B30; --line:rgba(255,255,255,.07);
  --tx:#E9EDF7; --mut:#7E89A6; --gold:#F5C451; --host:#F4F7FF;
  --cmb:#FFD23F; --uefa:#56CCF2; --caf:#2ECC71; --afc:#FF6B6B; --cnc:#C78BFF; --ofc:#F2994A;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:radial-gradient(1200px 700px at 70% -10%,#12203b 0%,var(--ink) 55%);
  color:var(--tx);font-family:Inter,system-ui,sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
header{display:flex;align-items:center;gap:18px;padding:14px 20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.brand{font-family:Archivo;font-weight:900;letter-spacing:.02em;font-size:19px;line-height:1}
.brand small{display:block;font-family:"JetBrains Mono",monospace;font-weight:400;font-size:10px;letter-spacing:.28em;color:var(--mut);margin-top:5px}
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--mut);margin-left:auto}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.tools{display:flex;gap:8px}
button.tgl{background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:999px;
  padding:7px 13px;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.05em;cursor:pointer;transition:.15s}
button.tgl:hover{border-color:var(--gold);color:var(--gold)}
button.tgl.on{background:var(--gold);color:#0a0a0a;border-color:var(--gold)}
main{flex:1;display:grid;grid-template-columns:1fr 340px;min-height:0}
.mapwrap{position:relative;min-height:0}
svg{width:100%;height:100%;display:block}
.mono{font-family:"JetBrains Mono",monospace}
/* sidebar */
aside{border-left:1px solid var(--line);background:linear-gradient(180deg,var(--panel) 0%,#0b1020 100%);
  display:flex;flex-direction:column;min-height:0}
.search{padding:12px 14px;border-bottom:1px solid var(--line)}
.search input{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:9px;color:var(--tx);
  padding:9px 12px;font-family:Inter;font-size:13px;outline:none}
.search input:focus{border-color:var(--gold)}
.hint{font-size:10px;color:var(--mut);margin-top:7px;letter-spacing:.03em}
.list{overflow-y:auto;flex:1;padding:6px}
.row{display:grid;grid-template-columns:10px 1fr auto;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;cursor:pointer;transition:.12s}
.row:hover{background:var(--panel2)}
.row.sel{background:var(--panel2);box-shadow:inset 0 0 0 1px var(--gold)}
.row .bar{width:10px;height:10px;border-radius:50%}
.row .nm{font-size:13px;font-weight:600;line-height:1.15}
.row .sub{font-size:10.5px;color:var(--mut);margin-top:2px}
.row .km{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--gold);text-align:right;white-space:nowrap}
.row .km small{display:block;color:var(--mut);font-size:9px;letter-spacing:.04em}
.pin{color:var(--cmb)}
/* boarding pass */
.pass{border-top:1px solid var(--line);padding:14px 16px 16px}
.pass .top{display:flex;justify-content:space-between;align-items:flex-start}
.pass .team{font-family:Archivo;font-weight:800;font-size:17px;line-height:1.05}
.pass .conf{font-size:10px;color:var(--mut);letter-spacing:.14em;text-transform:uppercase;margin-top:3px}
.stage{font-family:"JetBrains Mono",monospace;font-size:10px;padding:4px 8px;border-radius:6px;background:var(--panel2);color:var(--gold);white-space:nowrap}
.stage.out{color:var(--afc)}
.bignum{font-family:Archivo;font-weight:900;font-size:40px;letter-spacing:-.02em;margin:12px 0 0;line-height:1}
.bignum small{font-family:"JetBrains Mono";font-size:12px;font-weight:400;color:var(--mut);letter-spacing:.1em;margin-left:6px}
.grid4{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.cell{background:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 11px}
.cell .k{font-size:9.5px;color:var(--mut);letter-spacing:.09em;text-transform:uppercase}
.cell .v{font-family:"JetBrains Mono",monospace;font-size:15px;margin-top:3px}
.play{margin-top:13px;width:100%;background:var(--gold);color:#0a0a0a;border:none;border-radius:9px;
  padding:11px;font-family:"JetBrains Mono",monospace;font-weight:700;font-size:12px;letter-spacing:.08em;cursor:pointer}
.play:active{transform:translateY(1px)}
.empty{padding:26px 18px;color:var(--mut);font-size:13px;line-height:1.5}
/* map overlays */
.counter{position:absolute;left:18px;bottom:16px;font-family:"JetBrains Mono",monospace;pointer-events:none}
.counter .c1{font-size:30px;font-weight:700;color:var(--gold);text-shadow:0 0 24px rgba(245,196,81,.35)}
.counter .c2{font-size:11px;color:var(--mut);letter-spacing:.1em;margin-top:2px}
.tip{position:absolute;padding:6px 9px;background:#05070d;border:1px solid var(--line);border-radius:7px;
  font-size:11px;pointer-events:none;opacity:0;transition:.1s;white-space:nowrap;font-family:"JetBrains Mono",monospace}
@media(max-width:820px){
  main{grid-template-columns:1fr;grid-template-rows:1fr auto}
  aside{border-left:none;border-top:1px solid var(--line);max-height:46vh}
}
</style>

<div class="app">
  <header>
    <div class="brand">MUNDIAL 2026<small>MAPA DE RECORRIDOS · 9 JUL</small></div>
    <div class="legend" id="legend"></div>
    <div class="tools">
      <button class="tgl" id="btnAll">Todas las rutas</button>
    </div>
  </header>
  <main>
    <div class="mapwrap">
      <svg id="map" viewBox="0 0 1000 760" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="counter" id="counter" style="display:none"><div class="c1" id="ckm">0 km</div><div class="c2" id="cleg"></div></div>
      <div class="tip" id="tip"></div>
    </div>
    <aside>
      <div class="search">
        <input id="q" placeholder="Buscar selección…" autocomplete="off">
        <div class="hint">Ordenadas por distancia recorrida. Clic para ver la ruta.</div>
      </div>
      <div class="list" id="list"></div>
      <div class="pass" id="pass"><div class="empty">Selecciona una selección para trazar su recorrido y ver los kilómetros.</div></div>
    </aside>
  </main>
</div>

const NS='http://www.w3.org/2000/svg';
const svg=document.getElementById('map');
const W=1000,H=760,PAD=64;
const LONMIN=-125,LONMAX=-68,LATMIN=17.5,LATMAX=50.5;
const mercY=l=>Math.log(Math.tan(Math.PI/4+l*Math.PI/360));
const yTop=mercY(LATMAX), yBot=mercY(LATMIN);
function proj(lat,lon){
  const x=PAD+(lon-LONMIN)/(LONMAX-LONMIN)*(W-2*PAD);
  const y=PAD+(yTop-mercY(lat))/(yTop-yBot)*(H-2*PAD);
  return [x,y];
}
function el(t,a){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}

/* ---- base layers ---- */
const gGrat=el('g',{}), gGhost=el('g',{}), gCity=el('g',{}), gRoute=el('g',{}), gPlane=el('g',{});
svg.append(gGrat,gGhost,gCity,gRoute,gPlane);

// graticule
for(let lon=-120;lon<=-70;lon+=10){
  const p1=proj(LATMIN,lon),p2=proj(LATMAX,lon);
  gGrat.append(el('line',{x1:p1[0],y1:p1[1],x2:p2[0],y2:p2[1],stroke:'var(--line)','stroke-width':1}));}
for(let lat=20;lat<=50;lat+=10){const p1=proj(lat,LONMIN),p2=proj(lat,LONMAX);
  gGrat.append(el('line',{x1:p1[0],y1:p1[1],x2:p2[0],y2:p2[1],stroke:'var(--line)','stroke-width':1}));}
// region labels
[['CANADÁ',56,49.8,-96],['ESTADOS UNIDOS',72,39.5,-98],['MÉXICO',60,23.5,-102]].forEach(([t,fs,la,lo])=>{
  const[x,y]=proj(la,lo);const l=el('text',{x,y,'text-anchor':'middle',fill:'rgba(255,255,255,.10)',
    'font-family':'Archivo','font-weight':900,'font-size':fs,'letter-spacing':'.06em'});l.textContent=t;gGrat.append(l);});

// city nodes
const tip=document.getElementById('tip');
const cityPt={};
for(const[name,info] of Object.entries(CITIES)){
  const[x,y]=proj(info.coords[0],info.coords[1]); cityPt[name]=[x,y];
  const host=info.is_host_city;
  const c=el('circle',{cx:x,cy:y,r:host?4.2:2.4,
    fill:host?'var(--host)':'rgba(160,175,205,.5)',stroke:'#05070d','stroke-width':host?1.2:.6});
  c.style.cursor='default';
  c.addEventListener('mouseenter',e=>{tip.textContent=(host?'⚑ '+name+' · '+(info.stadium||''):name);
    tip.style.left=(x+10)+'px';tip.style.top=(y-8)+'px';tip.style.opacity=1;});
  c.addEventListener('mouseleave',()=>tip.style.opacity=0);
  gCity.append(c);
  if(host){const t=el('text',{x:x+7,y:y+3.5,fill:'rgba(233,237,247,.65)','font-size':9.5,
    'font-family':'JetBrains Mono'});t.textContent=name.replace('New York/New Jersey','NY/NJ').replace('San Francisco Bay Area','SF Bay');gCity.append(t);}
}

/* ---- arc path between two cities ---- */
function arc(a,b,lift){
  const[x1,y1]=cityPt[a],[x2,y2]=cityPt[b];
  const mx=(x1+x2)/2,my=(y1+y2)/2, dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy)||1;
  const nx=-dy/len,ny=dx/len, off=Math.min(len*.22,120)*(lift||1);
  const cx=mx+nx*off, cy=my+ny*off;
  return {d:`M${x1} ${y1} Q${cx} ${cy} ${x2} ${y2}`,x1,y1,x2,y2};
}

/* ---- ghost (all routes) ---- */
let ghostOn=false;
function drawGhost(){
  gGhost.innerHTML='';
  if(!ghostOn)return;
  for(const code in IT){const t=IT[code],col=CONFC(t.confederation);
    for(const lg of t.legs){ if(lg.stage==='Return')continue;
      if(!cityPt[lg.from]||!cityPt[lg.to])continue;
      const A=arc(lg.from,lg.to,1);
      gGhost.append(el('path',{d:A.d,fill:'none',stroke:col,'stroke-width':.7,'stroke-opacity':.16}));}}
}
document.getElementById('btnAll').addEventListener('click',e=>{
  ghostOn=!ghostOn;e.target.classList.toggle('on',ghostOn);drawGhost();});

/* ---- render one team ---- */
let current=null, anim=null;
function clearRoute(){gRoute.innerHTML='';gPlane.innerHTML='';if(anim)cancelAnimationFrame(anim);
  document.getElementById('counter').style.display='none';}

function drawTeam(code,animate){
  clearRoute(); current=code;
  const t=IT[code], col=CONFC(t.confederation);
  // base star
  const[bx,by]=cityPt[t.baseCamp]||proj(t.baseCampCoords[0],t.baseCampCoords[1]);
  cityPt[t.baseCamp]=cityPt[t.baseCamp]||[bx,by];
  const star=el('path',{d:starPath(bx,by,8),fill:col,stroke:'#05070d','stroke-width':1});
  gRoute.append(star);
  const bl=el('text',{x:bx,y:by-13,'text-anchor':'middle',fill:col,'font-size':10.5,
    'font-family':'JetBrains Mono','font-weight':700});bl.textContent='BASE · '+t.baseCamp.toUpperCase();gRoute.append(bl);

  const legs=t.legs.filter(l=>cityPt[l.from]&&cityPt[l.to]);
  const paths=[];
  legs.forEach(lg=>{
    const ret=lg.stage==='Return', ko=['Round32','Round16','Quarterfinal','Semifinal','Final'].includes(lg.stage)||
      ['Dieciseisavos','Octavos de final','Cuartos de final','Semifinales','Final'].includes(lg.stage);
    const A=arc(lg.from,lg.to,ret?-1:1);
    const p=el('path',{d:A.d,fill:'none',stroke:ret?'rgba(160,175,205,.35)':col,
      'stroke-width':ret?1:(ko?3:2),'stroke-linecap':'round',
      'stroke-dasharray':ret?'2 5':'none','stroke-opacity':ret?.8:.95});
    if(ko)p.setAttribute('filter','url(#glow)');
    gRoute.append(p);paths.push({p,lg,ret});
  });
  fillPass(t);
  if(animate) runAnim(paths,t); 
}
function starPath(cx,cy,r){let d='';for(let i=0;i<10;i++){const ang=Math.PI/5*i-Math.PI/2,rr=i%2?r*.42:r;
  d+=(i?'L':'M')+(cx+Math.cos(ang)*rr)+' '+(cy+Math.sin(ang)*rr)+' ';}return d+'Z';}

/* glow filter */
const defs=el('defs',{});defs.innerHTML=
 '<filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3" result="b"/>'+
 '<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
svg.prepend(defs);

/* ---- playback animation ---- */
function runAnim(paths,t){
  const counter=document.getElementById('counter'),ckm=document.getElementById('ckm'),cleg=document.getElementById('cleg');
  counter.style.display='block';
  paths.forEach(o=>{const L=o.p.getTotalLength();o.p.style.strokeDasharray=L;o.p.style.strokeDashoffset=L;o.L=L;});
  let i=0,cum=0;
  const plane=el('circle',{r:4,fill:'#fff',filter:'url(#glow)'});gPlane.append(plane);
  function step(o,cb){const dur=Math.max(340,Math.min(o.L*3.2,1400));const t0=performance.now();
    (function fr(now){let k=Math.min((now-t0)/dur,1);const e=1-Math.pow(1-k,2);
      o.p.style.strokeDashoffset=o.L*(1-e);
      const pt=o.p.getPointAtLength(o.L*e);plane.setAttribute('cx',pt.x);plane.setAttribute('cy',pt.y);
      if(!o.ret){const km=cum+(o.lg.distance_km*e);ckm.textContent=Math.round(km).toLocaleString('es')+' km';}
      cleg.textContent=(o.ret?'↩ regreso a base · ':'✈ ')+o.lg.from+' → '+o.lg.to;
      if(k<1)anim=requestAnimationFrame(fr);else{if(!o.ret)cum+=o.lg.distance_km;cb();}
    })(t0);}
  (function next(){if(i>=paths.length){ckm.textContent=Math.round(t.metrics.total_km).toLocaleString('es')+' km';
    cleg.textContent='recorrido total · '+t.metrics.num_legs+' tramos';gPlane.innerHTML='';return;}
    step(paths[i],()=>{i++;next();});})();
}

/* ---- boarding pass ---- */
function fillPass(t){
  const m=t.metrics, out=t.eliminated;
  document.getElementById('pass').innerHTML=`
   <div class="top">
     <div><div class="team">${t.team}</div><div class="conf">${t.confederation} · base ${t.baseCamp}</div></div>
     <div class="stage ${out?'out':''}">${out?'ELIM · '+(t.eliminatedRound||''):t.stageReached.toUpperCase()}</div>
   </div>
   <div class="bignum">${Math.round(m.total_km).toLocaleString('es')}<small>KM${out?'':' · sigue vivo'}</small></div>
   <div class="grid4">
     <div class="cell"><div class="k">Grupos</div><div class="v">${Math.round(m.group_stage_km).toLocaleString('es')} km</div></div>
     <div class="cell"><div class="k">Eliminatorias</div><div class="v">${Math.round(m.knockout_km).toLocaleString('es')} km</div></div>
     <div class="cell"><div class="k">Tramos · Ciudades</div><div class="v">${m.num_legs} · ${m.cities_visited}</div></div>
     <div class="cell"><div class="k">Países</div><div class="v">${m.countries_visited} · ${m.countries.join(' ')}</div></div>
     <div class="cell"><div class="k">Salto + largo</div><div class="v">${Math.round(m.longest_leg_km).toLocaleString('es')} km</div></div>
     <div class="cell"><div class="k">Promedio</div><div class="v">${Math.round(m.avg_leg_km).toLocaleString('es')} km</div></div>
   </div>
   <button class="play" id="playBtn">▶ Reproducir recorrido</button>`;
  document.getElementById('playBtn').addEventListener('click',()=>drawTeam(t.code,true));
}

/* ---- sidebar list ---- */
const listEl=document.getElementById('list');
const ranked=Object.values(IT).sort((a,b)=>b.metrics.total_km-a.metrics.total_km);
function renderList(filter){
  listEl.innerHTML='';
  const f=(filter||'').toLowerCase();
  ranked.filter(t=>t.team.toLowerCase().includes(f)||t.code.toLowerCase().includes(f)).forEach(t=>{
    const r=el('div',{class:'row'+(t.code===current?' sel':'')});r.dataset.code=t.code;
    r.innerHTML=`<span class="bar" style="background:${CONFC(t.confederation)}"></span>
      <div><div class="nm">${t.team}${t.code==='COL'?' <span class="pin">★</span>':''}</div>
      <div class="sub">${t.eliminated?t.eliminatedRound:t.stageReached+' · en juego'}</div></div>
      <div class="km">${Math.round(t.metrics.total_km).toLocaleString('es')}<small>KM</small></div>`;
    r.addEventListener('click',()=>{drawTeam(t.code,true);
      [...listEl.children].forEach(c=>c.classList.remove('sel'));r.classList.add('sel');});
    listEl.append(r);
  });
}
document.getElementById('q').addEventListener('input',e=>renderList(e.target.value));

/* legend */
document.getElementById('legend').innerHTML=Object.keys(CONF).map(c=>
  `<span><i class="dot" style="background:${CONFC(c)}"></i>${c}</span>`).join('')+
  `<span><i class="dot" style="background:var(--host)"></i>Sede</span>`;

renderList('');
drawTeam('COL',true);   // Colombia primero
</script>
